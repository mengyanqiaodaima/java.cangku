<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存查询</title>
    <!-- 引入Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <!-- 引入现代化样式 -->
    <link rel="stylesheet" href="assets/css/modern.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar">
                <div class="sidebar-header">
                    <h4>仓库管理系统</h4>
                </div>
                <ul class="sidebar-menu">
                    <li><a href="index.html"><i class="fa fa-dashboard"></i> 首页</a></li>
                    <li><a href="warehouse.html"><i class="fa fa-building"></i> 仓库管理</a></li>
                    <li><a href="material-category.html"><i class="fa fa-sitemap"></i> 物资分类</a></li>
                    <li><a href="material-ledger.html"><i class="fa fa-book"></i> 物资台账</a></li>
                    <li><a href="warehouse-in.html"><i class="fa fa-arrow-down"></i> 入库管理</a></li>
                    <li><a href="warehouse-out.html"><i class="fa fa-arrow-up"></i> 出库管理</a></li>
                    <li><a href="inventory.html" class="active"><i class="fa fa-search"></i> 库存查询</a></li>
                </ul>
            </div>
            
            <!-- 主内容区 -->
            <div class="col-md-10 content">
                <div class="page-header">
                    <h2>库存查询</h2>
                </div>
                
                <!-- 查询条件 -->
                <div class="row content-row">
                    <div class="col-md-12">
                        <div class="card" data-card>
                            <div class="card-body">
                                <form>
                                    <div class="form-row">
                                        <div class="form-group col-md-3">
                                            <label for="warehouse">仓库</label>
                                            <select class="form-control" id="warehouse">
                                                <option value="">所有仓库</option>
                                                <option value="1">一号仓库</option>
                                                <option value="2">二号仓库</option>
                                            </select>
                                        </div>
                                        <div class="form-group col-md-3">
                                            <label for="materialName">物资名称</label>
                                            <input type="text" class="form-control" id="materialName" placeholder="请输入物资名称">
                                        </div>
                                        <div class="form-group col-md-3">
                                            <label for="materialCode">物资编码</label>
                                            <input type="text" class="form-control" id="materialCode" placeholder="请输入物资编码">
                                        </div>
                                        <div class="form-group col-md-3">
                                            <label for="category">物资分类</label>
                                            <select class="form-control" id="category">
                                                <option value="">所有分类</option>
                                                <option value="1">金属材料</option>
                                                <option value="2">非金属材料</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group col-md-3">
                                            <label for="minStock">最低库存预警</label>
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="minStock">
                                                <label class="form-check-label" for="minStock">
                                                    只显示低于最低库存的物资
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                    <button type="button" class="btn btn-primary btn-lg btn-rounded">
                                        <i class="fa fa-search"></i> 查询
                                    </button>
                                    <button type="button" class="btn btn-secondary btn-lg btn-rounded">
                                        <i class="fa fa-refresh"></i> 重置
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 库存列表 -->
                <div class="row content-row">
                    <div class="col-md-12">
                        <div class="card" data-card>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table modern-table">
                                        <thead>
                                        <tr>
                                            <th>仓库</th>
                                            <th>物资编码</th>
                                            <th>物资名称</th>
                                            <th>分类</th>
                                            <th>规格</th>
                                            <th>单位</th>
                                            <th>当前库存</th>
                                            <th>最低库存</th>
                                            <th>状态</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td>一号仓库</td>
                                            <td>MAT001</td>
                                            <td>螺丝</td>
                                            <td>金属材料</td>
                                            <td>M8×20</td>
                                            <td>个</td>
                                            <td>500</td>
                                            <td>100</td>
                                            <td><span class="badge badge-success">正常</span></td>
                                        </tr>
                                        <tr>
                                            <td>一号仓库</td>
                                            <td>MAT002</td>
                                            <td>螺母</td>
                                            <td>金属材料</td>
                                            <td>M8</td>
                                            <td>个</td>
                                            <td>500</td>
                                            <td>100</td>
                                            <td><span class="badge badge-success">正常</span></td>
                                        </tr>
                                        <tr>
                                            <td>二号仓库</td>
                                            <td>MAT003</td>
                                            <td>塑料板</td>
                                            <td>非金属材料</td>
                                            <td>1000×500×5</td>
                                            <td>块</td>
                                            <td>10</td>
                                            <td>20</td>
                                            <td><span class="badge badge-warning">低于最低库存</span></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 引入jQuery和Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
